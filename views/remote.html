<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pool Trainer Remote</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    height: 100%;
    min-height: 100%;
    background: #1a1a2e;
    color: #fff;
    font-family: Arial, sans-serif;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
    user-select: none;
    overflow: hidden;
}

body {
    display: flex;
    height: -webkit-fill-available;
}

body.app-loading .container {
    pointer-events: none;
    opacity: 0.6;
}

.loading-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    background: rgba(16,16,28,0.85);
    color: #fff;
    z-index: 10;
    text-align: center;
    padding: 16px;
}

body.app-loading .loading-overlay {
    display: flex;
}

.loading-title { font-size: 16px; font-weight: bold; }
.loading-sub { font-size: 12px; color: #aaa; }

.container {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    flex: 1;
    padding: 10px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    background: #1a1a2e;
    gap: 8px;
}

.status { text-align: center; font-size: 13px; padding: 4px; color: #888; }
.status.connected { color: #0f0; }
.status.disconnected { color: #f44; }

.info { text-align: center; font-size: 16px; color: #ccc; padding: 6px; min-height: 28px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.btn-row { display: flex; gap: 6px; }

.btn { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column;
    border: 2px solid #555; border-radius: 12px; background: #2a2a3e; color: #fff;
    font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.1s;
    min-height: 0; padding: 10px 4px; }
.btn:active { background: #444; }
.btn .icon { font-size: 32px; margin-bottom: 2px; }

/* View switching */
.view { display: none; flex-direction: column; flex: 1; gap: 8px; }
.view.active { display: flex; }

/* Menu nav */
.btn-up, .btn-down { border-color: #58f; }
.btn-up:active, .btn-down:active { background: #58f; }
.btn-select { border-color: #0a0; background: #1a3a1a; }
.btn-select:active { background: #0a0; }
.btn-back { border-color: #a55; }
.btn-back:active { background: #a55; }

/* Drill nav */
.btn-next { border-color: #0a0; }
.btn-next:active { background: #0a0; }
.btn-prev { border-color: #666; }
.btn-prev:active { background: #444; }
.btn-menu { border-color: #58f; }
.btn-menu:active { background: #58f; }

.btn-rack { border-color: #448; }
.btn-rack:active { background: #448; }
.btn-util { border-color: #555; }
.btn-util:active { background: #555; }

.section-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px;
    padding: 2px 4px; }

/* Edit mode */
.btn-edit-nav { border-color: #0ef; }
.btn-edit-nav:active { background: #0ef; color: #000; }
.btn-edit-adj { border-color: #58f; }
.btn-edit-adj:active { background: #58f; }
.btn-edit-done { border-color: #a55; }
.btn-edit-done:active { background: #a55; }
.btn-edit-save { border-color: #0a0; background: #1a3a1a; }
.btn-edit-save:active { background: #0a0; }
.btn-edit-new { border-color: #f0a; background: #2a1a2e; }
.btn-edit-new:active { background: #f0a; }
.btn-drop { border-color: #fa0; background: #2e2a1a; }
.btn-drop:active { background: #fa0; color: #000; }

/* New drill form */
.form-field { padding: 4px 0; }
.form-label { font-size: 11px; color: #888; display: block; margin-bottom: 3px; }
.form-input { width: 100%; padding: 10px; font-size: 16px; border: 2px solid #555; border-radius: 8px;
    background: #2a2a3e; color: #fff; font-family: Arial, sans-serif; box-sizing: border-box; }
.form-input:focus { border-color: #f0a; outline: none; }
</style>
</head>
<body>
<div class="container">
    <div class="status disconnected" id="status">Connecting...</div>
    <div class="info" id="info">Look at the table</div>

    <!-- MENU VIEW: vertical nav -->
    <div class="view active" id="view-menu">
        <div class="btn btn-up" data-action="up" style="flex:1.5"><span class="icon">▲</span>UP</div>
        <div class="btn-row" style="flex:1.5">
            <div class="btn btn-back" data-action="back"><span class="icon">◀</span>BACK</div>
            <div class="btn btn-select" data-action="select"><span class="icon">✓</span>SELECT</div>
        </div>
        <div class="btn btn-down" data-action="down" style="flex:1.5"><span class="icon">▼</span>DOWN</div>
    </div>

    <!-- DRILL VIEW: prev/next + menu toggle -->
    <div class="view" id="view-drill">
        <div class="btn-row" style="flex:3">
            <div class="btn btn-prev" data-action="prev"><span class="icon">◀</span>PREV</div>
            <div class="btn btn-next" data-action="next"><span class="icon">▶</span>NEXT</div>
        </div>
        <div class="btn btn-menu" data-action="menu" style="flex:1"><span class="icon">☰</span>MENU</div>
    </div>

    <!-- EDIT VIEW: directional controls for cue overlay editing -->
    <div class="view" id="view-edit">
        <div class="btn btn-edit-nav" data-action="editUp" style="flex:1.2"><span class="icon">▲</span>UP</div>
        <div class="btn-row" style="flex:1.2">
            <div class="btn btn-edit-adj" data-action="editLeft"><span class="icon">◀</span>−</div>
            <div class="btn btn-edit-adj" data-action="editRight"><span class="icon">▶</span>+</div>
        </div>
        <div class="btn btn-edit-nav" data-action="editDown" style="flex:1.2"><span class="icon">▼</span>DOWN</div>
        <div class="btn-row" style="flex:0.8">
            <div class="btn btn-edit-adj" data-action="ballPrev"><span class="icon">◀</span></div>
            <div class="btn btn-drop" data-action="dropBall"><span class="icon" id="drop-ball-icon">⓪</span>DROP</div>
            <div class="btn btn-edit-adj" data-action="ballNext"><span class="icon">▶</span></div>
        </div>
        <div class="btn-row" style="flex:0.8">
            <div class="btn btn-edit-done" data-action="editDone"><span class="icon">✕</span>DONE</div>
            <div class="btn btn-edit-save" data-action="editSave"><span class="icon">💾</span>SAVE</div>
            <div class="btn btn-edit-new" data-action="editNew"><span class="icon">➕</span>NEW</div>
        </div>
    </div>

    <!-- NEW DRILL VIEW: name input + category/difficulty -->
    <div class="view" id="view-newdrill">
        <div class="form-field">
            <label class="form-label">Drill Name</label>
            <input type="text" id="newdrill-name" class="form-input" placeholder="My Custom Drill" autocomplete="off">
        </div>
        <div class="btn btn-edit-nav" data-action="ndUp" style="flex:0.8"><span class="icon">▲</span></div>
        <div class="btn-row" style="flex:0.8">
            <div class="btn btn-edit-adj" data-action="ndLeft"><span class="icon">◀</span></div>
            <div class="btn btn-edit-adj" data-action="ndRight"><span class="icon">▶</span></div>
        </div>
        <div class="btn btn-edit-nav" data-action="ndDown" style="flex:0.8"><span class="icon">▼</span></div>
        <div class="btn-row" style="flex:0.8">
            <div class="btn btn-edit-done" data-action="ndCancel"><span class="icon">✕</span>CANCEL</div>
            <div class="btn btn-edit-save" data-action="ndSave"><span class="icon">💾</span>SAVE</div>
        </div>
    </div>

    <!-- Utilities: always visible -->
    <div class="section-label">Quick Actions</div>
    <div class="btn-row" style="flex:0">
        <div class="btn btn-rack" data-action="rack9">9-BALL</div>
        <div class="btn btn-rack" data-action="rack8">8-BALL</div>
        <div class="btn btn-util" data-action="clear">CLEAR</div>
        <div class="btn btn-util" data-action="projection">PROJ</div>
    </div>
    <div class="btn-row" style="flex:0">
        <div class="btn btn-util" data-action="edit">EDIT</div>
    </div>
</div>

<div class="loading-overlay" id="loading">
    <div class="loading-title" id="loading-title">Connecting...</div>
    <div class="loading-sub" id="loading-sub">Opening socket</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket, statusEl, infoEl;
var lastTouchTime = 0;
var initialized = false;
var currentMode = '';
var primaryAppId = null;
var sessionId = new URLSearchParams(window.location.search).get('session') || '';
var loadingTitleEl = null;
var loadingSubEl = null;
var dropBallNum = 0;
var ballIcons = ['⓪','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮'];

function init() {
    if (initialized) return;
    initialized = true;
    statusEl = document.getElementById('status');
    infoEl = document.getElementById('info');
    loadingTitleEl = document.getElementById('loading-title');
    loadingSubEl = document.getElementById('loading-sub');

    setUiEnabled(false, 'Connecting...', 'Opening socket');

    var btns = document.querySelectorAll('[data-action]');
    for (var i = 0; i < btns.length; i++) {
        (function (btn) {
            btn.addEventListener('touchstart', function (e) {
                e.preventDefault();
                lastTouchTime = Date.now();
                handleAction(btn.getAttribute('data-action'));
            }, { passive: false });
            btn.addEventListener('mousedown', function () {
                if (Date.now() - lastTouchTime < 500) return;
                handleAction(btn.getAttribute('data-action'));
            });
        })(btns[i]);
    }

    // Handle special actions that need extra data
    function handleAction(action) {
        if (action === 'ballPrev') {
            dropBallNum = (dropBallNum - 1 + 16) % 16;
            updateDropIcon();
            return;
        }
        if (action === 'ballNext') {
            dropBallNum = (dropBallNum + 1) % 16;
            updateDropIcon();
            return;
        }
        if (action === 'dropBall') {
            send('dropBall', { num: dropBallNum });
            return;
        }
        if (action === 'editNew') {
            // Switch remote to new drill view for name input
            switchView('newdrill');
            var nameInput = document.getElementById('newdrill-name');
            if (nameInput) { nameInput.value = ''; nameInput.focus(); }
            // Tell main app to enter new drill mode (no prompt)
            send('editNewRemote');
            return;
        }
        if (action === 'ndSave') {
            var nameInput = document.getElementById('newdrill-name');
            var name = nameInput ? nameInput.value.trim() : '';
            if (!name) { nameInput.focus(); return; }
            // Send name first, then save
            send('ndName', { name: name });
            setTimeout(function () { send('ndSave'); }, 50);
            return;
        }
        if (action === 'ndCancel') {
            switchView('edit');
            send('ndCancel');
            return;
        }
        send(action);
    }

    // Socket.IO handles reconnection, heartbeat, transport fallback automatically
    socket = io({ query: { role: 'remote', session: sessionId } });

    socket.on('connect', function () {
        statusEl.textContent = 'Connected';
        statusEl.className = 'status connected';
        setUiEnabled(true);
        send('requestStatus');
    });

    socket.on('disconnect', function (reason) {
        statusEl.textContent = 'Disconnected (' + reason + ')';
        statusEl.className = 'status disconnected';
        setUiEnabled(false, 'Disconnected', 'Reconnecting...');
    });

    socket.on('cmd', function (data) {
        if (data.type === 'status') {
            if (data.appId) {
                if (!primaryAppId) primaryAppId = data.appId;
                if (primaryAppId !== data.appId) return;
            }
            if (data.text) infoEl.textContent = data.text;
            if (data.mode && data.mode !== currentMode) {
                currentMode = data.mode;
                switchView(currentMode);
            }
        }
    });
}

function setUiEnabled(enabled, title, sub) {
    if (title) loadingTitleEl.textContent = title;
    if (sub) loadingSubEl.textContent = sub;
    document.body.className = enabled ? '' : 'app-loading';
}

document.addEventListener('DOMContentLoaded', init);
if (document.readyState !== 'loading') init();

function switchView(mode) {
    var menuView = document.getElementById('view-menu');
    var drillView = document.getElementById('view-drill');
    var editView = document.getElementById('view-edit');
    var newdrillView = document.getElementById('view-newdrill');
    menuView.className = 'view';
    drillView.className = 'view';
    editView.className = 'view';
    newdrillView.className = 'view';
    if (mode === 'newdrill') {
        newdrillView.className = 'view active';
    } else if (mode === 'edit') {
        editView.className = 'view active';
    } else if (mode === 'drill') {
        drillView.className = 'view active';
    } else {
        menuView.className = 'view active';
    }
}

function send(action, extra) {
    if (socket && socket.connected) {
        var msg = { action: action };
        if (extra) { for (var k in extra) msg[k] = extra[k]; }
        socket.emit('cmd', msg);
    }
}

function updateDropIcon() {
    var el = document.getElementById('drop-ball-icon');
    if (el) el.textContent = ballIcons[dropBallNum];
}
</script>
</body>
</html>
