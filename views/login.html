<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pool Trainer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    color: #fff;
    font-family: Arial, sans-serif;
}
.card {
    background: #2a2a3e;
    border: 2px solid #555;
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    width: 300px;
}
h1 { font-size: 20px; margin-bottom: 24px; color: #0ef; }
input {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    border: 2px solid #555;
    border-radius: 8px;
    background: #1a1a2e;
    color: #fff;
    text-align: center;
    letter-spacing: 8px;
    margin-bottom: 16px;
}
input:focus { border-color: #0ef; outline: none; }
button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    border: 2px solid #0a0;
    border-radius: 8px;
    background: #1a3a1a;
    color: #fff;
    cursor: pointer;
}
button:active { background: #0a0; }
.err { color: #f44; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<form class="card" method="POST" action="/login">
    <h1>🎱 Pool Trainer</h1>
    {{ERROR}}
    <input type="hidden" name="return_to" value="{{RETURN_TO}}">
    <input type="password" name="pin" placeholder="PIN" autofocus autocomplete="off" inputmode="numeric">
    <button type="submit">Enter</button>
</form>
</body>
</html>
